<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box; }
        h2 { text-align: center; color: #333; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; color: #666; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        .link-action { text-align: center; margin-top: 15px; font-size: 13px; }
        .link-action a { color: #007bff; text-decoration: none; cursor: pointer; }
        .link-action a:hover { text-decoration: underline; }
        .hidden { display: none; }
        .message { margin-top: 15px; padding: 10px; border-radius: 4px; font-size: 14px; text-align: center; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <div id="msgBox" class="message"></div>

    <div id="loginSection">
        <h2>Iniciar Sesión</h2>
<form id="loginForm" onsubmit="event.preventDefault(); ejecutarLogin();">            
    <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="loginEmail" required placeholder="correo@ejemplo.com">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="loginPassword" required placeholder="********">
            </div>
            <button type="submit">Ingresar</button>
        </form>
        <div class="link-action">
            <a onclick="toggleForm(true)">¿Olvidaste tu contraseña?</a>
        </div>
    </div>

    <div id="recoverySection" class="hidden">
        <h2>Recuperar Contraseña</h2>
        
        <div id="stepRequest">
            <div class="form-group">
                <label>Tu Correo Registrado</label>
                <input type="email" id="recoveryEmail" placeholder="correo@ejemplo.com">
            </div>
            <button type="button" onclick="actionRequestToken()">Solicitar Código</button>
        </div>

        <div id="stepReset" class="hidden" style="margin-top: 20px; border-top: 1px dashed #ccc; padding-top: 15px;">
            <div class="form-group">
                <label>Código de Verificación (6 dígitos)</label>
                <input type="text" id="recoveryToken" maxlength="6" placeholder="123456">
            </div>
            <div class="form-group">
                <label>Nueva Contraseña</label>
                <input type="password" id="newPassword" placeholder="Escribe tu nueva contraseña">
            </div>
            <button type="button" onclick="actionResetPassword()">Cambiar Contraseña</button>
        </div>

        <div class="link-action">
            <a onclick="toggleForm(false)" style="color: #6c757d;">Volver al Login</a>
        </div>
    </div>
</div>

<script>
    const msgBox = document.getElementById('msgBox');

    function notify(text, success = false) {
        msgBox.textContent = text;
        msgBox.className = `message ${success ? 'success' : 'error'}`;
        msgBox.style.display = 'block';
    }

    function toggleForm(showRecovery) {
        msgBox.style.display = 'none';
        document.getElementById('loginSection').classList.toggle('hidden', showRecovery);
        document.getElementById('recoverySection').classList.toggle('hidden', !showRecovery);
    }

    // DISPARADOR VISUAL DEL ISSUE 3
    async function actionRequestToken() {
        const correo = document.getElementById('recoveryEmail').value;
        if (!correo) return notify("Ingresa un correo válido.");

        try {
            const res = await fetch('/api/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ correo })
            });
            const data = await res.json();

            if (res.ok) {
                notify("Código enviado. Búscalo abajo en la terminal de Docker.", true);
                document.getElementById('stepReset').classList.remove('hidden'); // Muestra los campos para cambiar contraseña
            } else {
                notify(data.error || "Error al procesar");
            }
        } catch {
            notify("No hay comunicación con el backend.");
        }
    }

    // DISPARADOR VISUAL DEL ISSUE 4
    async function actionResetPassword() {
        const correo = document.getElementById('recoveryEmail').value;
        const token = document.getElementById('recoveryToken').value;
        const nuevaPassword = document.getElementById('newPassword').value;

        if (!token || !nuevaPassword) return notify("Faltan datos por rellenar.");

        try {
            const res = await fetch('/api/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ correo, token, nuevaPassword })
            });
            const data = await res.json();

            if (res.ok) {
                notify("¡Contraseña actualizada con éxito! Redirigiendo...", true);
                setTimeout(() => {
                    // Limpia campos y regresa
                    document.getElementById('recoveryEmail').value = '';
                    document.getElementById('recoveryToken').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('stepReset').classList.add('hidden');
                    toggleForm(false);
                }, 2500);
            } else {
                notify(data.error || "Código erróneo");
            }
        } catch {
            notify("Error al actualizar.");
        }
    }
    async function ejecutarLogin() {
    const correo = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    if (!correo || !password) {
        return notify("Por favor, rellena todos los campos.");
    }

    try {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ correo, password })
        });
        const data = await res.json();

   if (res.ok) {
            notify("¡Inicio de sesión exitoso! Redirigiendo al panel...", true);

            // 🌟 NUEVA LÍNEA: Guarda el correo para que el logout sepa quién está saliendo
            localStorage.setItem('correoUsuario', correo);

            // Espera 1.5 segundos para que alcances a ver la alerta verde y te redirige
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1500);
        } else {
            notify(data.error || "Credenciales incorrectas. Intenta de nuevo.");
        }
    } catch (err) {
        notify("Error crítico: No se pudo conectar con el servidor de autenticación.");
    }
}
</script>
</body>
</html>
